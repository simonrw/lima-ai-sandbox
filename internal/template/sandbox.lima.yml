minimumLimaVersion: "2.0.0"

base:
  - template:_images/ubuntu
  - template:_default/mounts

{{- if and .ProjectDir (not .Branch) }}
mounts:
  - location: "{{ .ProjectDir }}"
    mountPoint: "/workspace"
    writable: true
{{- end }}

{{- if .APIKey }}
env:
  ANTHROPIC_API_KEY: "{{ .APIKey }}"
{{- end }}

{{- if or .CPUs .Memory .Disk }}
{{- if .CPUs }}
cpus: {{ .CPUs }}
{{- end }}
{{- if .Memory }}
memory: "{{ .Memory }}"
{{- end }}
{{- if .Disk }}
disk: "{{ .Disk }}"
{{- end }}
{{- end }}

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -euo pipefail
      if command -v claude >/dev/null 2>&1; then exit 0; fi
{{- if .Branch }}
  - mode: user
    script: |
      #!/bin/bash
      set -euo pipefail
      if git clone --branch "{{ .Branch }}" "{{ .GitURL }}" /workspace; then
        echo "Cloned existing branch {{ .Branch }}"
      else
        git clone "{{ .GitURL }}" /workspace
        cd /workspace
        git checkout -b "{{ .Branch }}"
        echo "Created new branch {{ .Branch }}"
      fi
      cd /workspace
      {{- if .GitUserName }}
      git config user.name "{{ .GitUserName }}"
      {{- end }}
      {{- if .GitUserEmail }}
      git config user.email "{{ .GitUserEmail }}"
      {{- end }}
      mkdir -p .git/hooks
      cat > .git/hooks/post-commit << 'HOOK'
      #!/bin/bash
      branch=$(git symbolic-ref --short HEAD)
      git push origin "$branch" 2>&1 || echo "Warning: post-commit push to host failed" >&2
      HOOK
      chmod +x .git/hooks/post-commit
{{- end }}
  - mode: user
    script: |
      #!/bin/bash
      set -euo pipefail
      curl -fsSL https://claude.ai/install.sh | bash
      echo 'export PATH=${PATH}:${HOME}/.local/bin' >> ~/.bashrc

probes:
  - mode: readiness
    description: "claude to be installed"
    script: |
      #!/bin/bash
      if ! timeout 120s bash -c "until command -v claude; do sleep 3; done"; then
        echo >&2 "claude is not installed yet"
        exit 1
      fi
    hint: |
      claude was not installed in the guest. Check /var/log/cloud-init-output.log in the guest.
